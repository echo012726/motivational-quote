name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_o3qDe8eaQwlJKOVu985ZZqC5
          vercel-project-id: prj_MaJaLq9SPJUPttyYJHpM9I7YgqPl
          vercel-args: '--prod'
