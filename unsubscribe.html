<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Daily Motivational Quotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; text-align: center; }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .logo span { color: #ffd700; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .unsubscribe-form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
        }
        input[type="email"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        input:focus { outline: none; border-color: #ffd700; }
        .unsubscribe-btn {
            width: 100%;
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .unsubscribe-btn:hover { transform: scale(1.02); }
        .success-message, .error-message {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .success-message {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #ffd700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Motivational<span>Quote</span></div>
        
        <h1>😢 We're Sorry to See You Go</h1>
        <p class="subtitle">Enter your email to unsubscribe from daily motivational quotes.</p>

        <div class="unsubscribe-form">
            <form id="unsubscribeForm">
                <input type="email" id="email" placeholder="your@email.com" required>
                <button type="submit" class="unsubscribe-btn">Unsubscribe</button>
            </form>
            
            <div class="success-message" id="successMessage">
                ✅ You've been unsubscribed. We'll miss you!
            </div>
            
            <div class="error-message" id="errorMessage"></div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        document.getElementById('unsubscribeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('/api/unsubscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successMessage.style.display = 'block';
                    document.getElementById('unsubscribeForm').style.display = 'none';
                } else {
                    errorMessage.textContent = data.error || 'Email not found';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
<script src="/js/analytics.js"></script>
</body>
</html>
